<style>
  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    margin: 20px;
  }
.youtube-icon {
  position: absolute;
  bottom: 0px;
  right: 5px;
  width: 32px;
  height: 32px;
  background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  pointer-events: none; /* icon won’t block clicks */
}
.card {
  position: relative; /* allow absolute positioning inside */
}

  .card {
    padding: 15px;
    background-color: #f9f9f9;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    text-align: left;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  .card:hover {
    opacity: 0.5;
    background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  }

.gif-card {
  aspect-ratio: 1 / 1;   /* force square */
  display: flex;
  justify-content: center;
  align-items: center;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  gap: 5px;
}

.gif-card:hover {
}


  .studio-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .project-label {
    font-size: 15px;
    margin-bottom: 4px;
    display: block;
  }

  .tag {
	--b: 4px; 
	--s: 5px;
  
    border: none;
    padding: 5px;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
	transform-origin: center;
	
  clip-path: polygon(
    0 0, 
    calc(100% - var(--s)) 0, 100% var(--s), 
    100% 100%, 
    var(--s) 100%, 0 calc(100% - var(--s))
  );
  
	}
.tag:hover{
	cursor:pointer;
	transform: rotate(-3deg);
	}

  /* Mobile view: list style with fixed height and right gap */
  @media (max-width: 600px) {
    .grid-container {
      display: flex;
      flex-direction: column; /* stack cards vertically */
    }
    .card {
      height: 50px;       /* fixed height */
      width: calc(100% - 16px); /* leave space on right side */
      padding: 10px;
      margin: 0 8px 0px 0; /* right gap + bottom spacing */
      overflow: hidden;
    }
    .studio-title {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .project-label {
      font-size: 13px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  }
</style>


<center>
<button class="tag" style="background-color:white;color:black;" onclick="filterCards('white')">My Cuts</button>
<button class="tag" style="background-color:orange;" onclick="filterCards('orange')">To Be Added</button>
<button class="tag" style="background-color:yellow;color:black;" onclick="filterCards('yellow')">Only Screenshots</button>
<button class="tag" style="background-color:black;color:white;" onclick="filterCards('black')">Full project</button>
<button class="tag" style="background-color:purple;color:white;" onclick="filterCards('gif')">GIFs</button>
<button class="tag" style="background-color:lightgray;color:black;" onclick="filterCards('all')">Show All</button>
<br><br>

<div id="tb" class="grid-container"></div>
</center>
s
<script>
let allCards=[]
fetch('data.json')
.then(r=>r.json())
.then(data=>{
  const tb=document.getElementById('tb')
  for(const key in data){
    const val=data[key]
    for(const sub_key in val){
      const sub_val=val[sub_key]
      const card=document.createElement('div')
      card.className='card'
      card.style.backgroundColor=sub_val["color"]||"#fff"
      card.dataset.color=sub_val["color"]||"white"
      if(sub_val["color"]==="black")card.style.color="white"
      if(sub_val["link"]&&sub_val["link"].toLowerCase().endsWith(".gif")){
        card.classList.add("gif-card")
        card.style.backgroundImage=`url(${sub_val["link"]})`
        card.style.color="transparent"
        card.dataset.color="gif"
        card.addEventListener('click',()=>window.open(sub_val["link"],"_blank"))
      }else{
        const studioTitle=document.createElement('div')
        studioTitle.className='studio-title'
        studioTitle.textContent=key
        card.appendChild(studioTitle)
        const label=document.createElement('span')
        label.className='project-label'
        label.textContent=sub_key
        card.appendChild(label)
        card.addEventListener('click',()=>window.open(sub_val["link"],"_blank"))
      }
      if(sub_val["link"]&&sub_val["link"].toLowerCase().includes("youtube.com")){
        const ytIcon=document.createElement('div')
        ytIcon.className='youtube-icon'
        card.appendChild(ytIcon)
      }
      tb.appendChild(card)
      allCards.push(card)
    }
  }
  filterCards('white')
})
function filterCards(color){
  allCards.forEach(card=>{
    card.style.display=(color==='all'||card.dataset.color===color)?'flex':'none'
  })
}
</script>
