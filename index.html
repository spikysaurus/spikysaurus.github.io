     <div class="container">

  <div class="centered-section">
    <h2 class="main-title">FEATURED WORKS</h2>
    <p class="subtitle">Click the title in the playlist to play the animation<br>You can scroll down the playlist to see more</p>
  </div>

  <!-- Left side -->
  <div class="left">
    <div class="video-wrapper">
      <iframe id="videoFrame" tabindex="0"
        src="https://www.youtube.com/embed/ywGcoaYo3-k?list=PLdk56EjsMhfjwymlCUUltcL63fZDmyZvZ"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- Right side -->
  <div class="right">
    <div class="grid" id="playlist"></div>
  </div>

</div>

</div>


<script>
 const videoFrame = document.getElementById('videoFrame');
const resetTitle = document.getElementById('resetVideo');
const playlist = document.getElementById('playlist');

const originalLink = "https://www.youtube.com/embed/ywGcoaYo3-k?list=PLdk56EjsMhfjwymlCUUltcL63fZDmyZvZ";

const videos = [
  { url: "https://www.youtube.com/embed/nTF6QBu7vMA", genre: "Anime", title: "Yaiba S1 E10" },
  { url: "https://www.youtube.com/embed/MSiL1tRuQiY", genre: "Anime", title: "Yaiba S1 E21" },
  { url: "https://x.com/JCStaffSakuga/status/1998352053714686021", genre: "Anime", title: "One Punch Man S3 E9" },
  { url: "https://www.youtube.com/embed/Bi_s_g2l1Yk", genre: "Anime", title: "Kinnikuman: Perfect Origin Arc S1 E06" },
  { url: "https://www.youtube.com/embed/akaQ1tarUQo", genre: "Video Game", title: "Inkbound" },
  { url: "https://www.youtube.com/embed/B_BOYNky24w", genre: "Video Game", title: "Hi-Fi Rush" },
  { url: "https://www.youtube.com/embed/BLUcapqwyuU", genre: "Video Game", title: "Friday Night Funkin" },
  { url: "https://www.youtube.com/embed/iZw1_2PFsZE", genre: "Video Game", title: "Vampire Survivors" },
  { url: "https://www.youtube.com/embed/YQXp2gEoevs", genre: "Video Game", title: "Nova Island" },
  { url: "https://www.youtube.com/embed/tkAB6crm764", genre: "Cartoon", title: "Animaniacs" },
  { url: "https://www.youtube.com/embed/-dxDCdMmeyI", genre: "Movie", title: "Tinggal Meninggal" },
  { url: "https://www.youtube.com/embed/ZArlzeNNAEs", genre: "Cartoon", title: "Helluvaboss" },
  { url: "https://www.youtube.com/embed/p5pbg6SNWDg", genre: "Cartoon", title: "Craig Before The Creek" },
  { url: "https://www.youtube.com/embed/IeXNLjLW2FY", genre: "Cartoon", title: "I Heart Arlo" }
];

videos.forEach(video => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.video = video.url;

  card.innerHTML = `
    <div class="overlay-genre">${video.genre}</div>
    <div class="overlay-title">${video.title}</div>
  `;

  card.addEventListener('click', () => {
	  let newVideo = video.url;

	  if (newVideo.includes("youtube.com")) {
		// Handle YouTube embeds inside iframe
		if (newVideo.includes("?")) {
		  newVideo += "&autoplay=1";
		} else {
		  newVideo += "?autoplay=1";
		}
		videoFrame.src = newVideo;
		videoFrame.scrollIntoView({ behavior: 'smooth', block: 'center' });
		videoFrame.focus();
	  } else {
		// Open non-YouTube links in a new tab
		window.open(newVideo, "_blank");
	  }
	});


  playlist.appendChild(card);
});

resetTitle.addEventListener('click', () => {
  videoFrame.src = originalLink;
});

   
</script>

  <script>
            const profileIcon = document.getElementById('profileIcon');
            const chatBubble = document.getElementById('chatBubble');
           
            // Toggle chat bubble when profile icon is clicked
            profileIcon.addEventListener('click', () => {
              if (chatBubble.style.display === 'none' || chatBubble.style.display === '') {
                chatBubble.style.display = 'block';
              } else {
                chatBubble.style.display = 'none';
              }
            });
           // Hide chat bubble when it is clicked
           chatBubble.addEventListener('click', () => {
             chatBubble.style.display = 'none'; });
        </script>
